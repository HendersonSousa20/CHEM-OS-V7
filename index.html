        const ATOMIC_WEIGHTS = {};

        function escapeHTML(str) {
            return String(str || '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));

        /* ==========================================================================
           2. MOTOR DE ÁLGEBRA LINEAR / BALANCIADOR DE EQUAÇÕES
           ========================================================================== */
        function parseFormula(formula) {
            let clean = formula.replace(/[\[\{]/g, '(').replace(/[\]\}]/g, ')').replace(/\s+/g, '').replace(/[*·]/g, '.');
            let parts = clean.split('.');
            let counts = {};
            let totalMass = 0;

            function parseSub(str, multiplier = 1) {
                let stack = [{}];
                let i = 0;
                while (i < str.length) {
                    if (str[i] === '(') {
                        stack.push({});
                        i++;
                    } else if (str[i] === ')') {
                        i++;
                        let matchNum = str.slice(i).match(/^(\d+(\.\d+)?)/);
                        let mult = matchNum ? parseFloat(matchNum[1]) : 1;
                        if (matchNum) i += matchNum[1].length;
                        let top = stack.pop();
                        let curr = stack[stack.length - 1];
                        for (let el in top) { curr[el] = (curr[el] || 0) + top[el] * mult; }
                    } else {
                        let matchElem = str.slice(i).match(/^([A-Z][a-z]?)/);
                        if (!matchElem) { i++; continue; }
                        let el = matchElem[1];
                        i += el.length;
                        let matchCnt = str.slice(i).match(/^(\d+(\.\d+)?)/);
                        let cnt = matchCnt ? parseFloat(matchCnt[1]) : 1;
                        if (matchCnt) i += matchCnt[1].length;
                        let curr = stack[stack.length - 1];
                        curr[el] = (curr[el] || 0) + cnt;
                    }
                }
                let res = stack[0];
                for (let el in res) { counts[el] = (counts[el] || 0) + res[el] * multiplier; }
            }

            parseSub(parts[0], 1);
            if (parts.length > 1) {
                for (let p = 1; p < parts.length; p++) {
                    let hMatch = parts[p].match(/^(\d*)(\D.*)?$/);
                    let hMult = hMatch && hMatch[1] ? parseFloat(hMatch[1]) : 1;
                    let hFormula = hMatch && hMatch[2] ? hMatch[2] : parts[p];
                    parseSub(hFormula, hMult);
                }
            }

            for (let el in counts) {
                if (ATOMIC_WEIGHTS[el]) { totalMass += ATOMIC_WEIGHTS[el] * counts[el]; }
            }
            return { totalMass, counts };
        }

        function gcd(a, b) {
            a = Math.abs(a); b = Math.abs(b);
            while (b) { let t = b; b = a % b; a = t; }
            return a;
        }

        function ratCreate(num, den = 1) {
            if (den === 0) return [0, 1];
            if (num === 0) return [0, 1];
            if (den < 0) { num = -num; den = -den; }
            let g = gcd(num, den);
            return [num / g, den / g];
        }

        function ratSub(a, b) { return ratCreate(a[0]*b[1] - b[0]*a[1], a[1]*b[1]); }
        function ratMul(a, b) { return ratCreate(a[0]*b[0], a[1]*b[1]); }
        function ratDiv(a, b) { return ratCreate(a[0]*b[1], a[1]*b[0]); }
        function ratIsZero(a) { return a[0] === 0; }

        function solveLinearSystem(matrix) {
            let m = matrix.length;
            let n = matrix[0].length;
            let k = n - 1;

            let M = matrix.map(row => row.map(cell => [...cell]));
            let lead = 0;

            for (let r = 0; r < m; r++) {
                if (k <= lead) break;
                let i = r;
                while (i < m && ratIsZero(M[i][lead])) { i++; }
                if (i === m) { lead++; r--; continue; }

                let temp = M[r]; M[r] = M[i]; M[i] = temp;

                let val = M[r][lead];
                for (let j = lead; j < n; j++) { M[r][j] = ratDiv(M[r][j], val); }

                for (let j = 0; j < m; j++) {
                    if (j !== r && !ratIsZero(M[j][lead])) {
                        let mult = M[j][lead];
                        for (let c = lead; c < n; c++) { M[j][c] = ratSub(M[j][c], ratMul(mult, M[r][c])); }
                    }
                }
                lead++;
            }

            let solution = new Array(k).fill(null);
            for (let r = 0; r < m; r++) {
                let firstLead = -1;
                for (let c = 0; c < k; c++) {
                    if (!ratIsZero(M[r][c])) { firstLead = c; break; }
                }
                if (firstLead !== -1) {
                    let allZero = true;
                    for (let c = firstLead + 1; c < k; c++) {
                        if (!ratIsZero(M[r][c])) { allZero = false; break; }
                    }
                    if (allZero) { solution[firstLead] = M[r][k]; }
                }
            }

            for (let i = 0; i < k; i++) { if (solution[i] === null) return null; }
            return solution;
        }

        function balanceChemicalEquation(equationStr) {
            let eq = equationStr.replace(/\s+/g, '');
            let sides = eq.split(/->|=/);
            if (sides.length !== 2) throw new Error("A equação deve conter '->' ou '='.");

            let leftComps = sides[0].split('+').filter(Boolean);
            let rightComps = sides[1].split('+').filter(Boolean);
            let allComps = [...leftComps, ...rightComps];
            let numReactants = leftComps.length;
            let n = allComps.length;

            let parsedComps = allComps.map(c => parseFormula(c).counts);
            let elements = Array.from(new Set(parsedComps.flatMap(c => Object.keys(c))));
            let m = elements.length;

            let A = elements.map(elem => parsedComps.map((comp, j) => {
                let cnt = comp[elem] || 0;
                return j < numReactants ? cnt : -cnt;
            }));

            let bestCoeffs = null;

            for (let refCol = 0; refCol < n; refCol++) {
                let augmented = elements.map((_, rIdx) => {
                    let row = [];
                    for (let cIdx = 0; cIdx < n; cIdx++) {
                        if (cIdx === refCol) continue;
                        row.push(ratCreate(A[rIdx][cIdx]));
                    }
                    row.push(ratCreate(-A[rIdx][refCol]));
                    return row;
                });

                let sol = solveLinearSystem(augmented);
                if (!sol) continue;

                let fullSol = [];
                let solIdx = 0;
                for (let cIdx = 0; cIdx < n; cIdx++) {
                    if (cIdx === refCol) { fullSol.push(ratCreate(1)); }
                    else { fullSol.push(sol[solIdx++]); }
                }

                let currentLcm = 1;
                for (let cIdx = 0; cIdx < n; cIdx++) {
                    let den = fullSol[cIdx][1];
                    currentLcm = (currentLcm * den) / gcd(currentLcm, den);
                }

                let candidate = fullSol.map(rat => Math.round((rat[0] * currentLcm) / rat[1]));

                if (candidate.some(v => v <= 0)) continue;

                let verified = true;
                for (let elemIdx = 0; elemIdx < m; elemIdx++) {
                    let leftSum = 0, rightSum = 0;
                    for (let j = 0; j < n; j++) {
                        let cnt = parsedComps[j][elements[elemIdx]] || 0;
                        if (j < numReactants) leftSum += cnt * candidate[j];
                        else rightSum += cnt * candidate[j];
                    }
                    if (leftSum !== rightSum) { verified = false; break; }
                }

                if (verified) { bestCoeffs = candidate; break; }
            }

            if (!bestCoeffs) throw new Error("Não foi possível balancear a reação com esta combinação.");

            let balancedLeft = leftComps.map((c, i) => (bestCoeffs[i] > 1 ? bestCoeffs[i] : '') + c).join(' + ');
            let balancedRight = rightComps.map((c, i) => (bestCoeffs[numReactants + i] > 1 ? bestCoeffs[numReactants + i] : '') + c).join(' + ');

            return { text: `${balancedLeft} ➔ ${balancedRight}`, coeffs: bestCoeffs, leftComps, rightComps, numReactants };
        }

        /* ==========================================================================
           3. INTEGRAÇÃO DE APIs — PUBCHEM (composto + elementos)
           ========================================================================== */
        async function fetchPubChemData(query) {
            try {
                const urlCID = `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${encodeURIComponent(query)}/cids/JSON`;
                const resCID = await fetch(urlCID);
                if (!resCID.ok) throw new Error("Composto não encontrado no banco de dados.");
                const dataCID = await resCID.json();
                const cid = dataCID.IdentifierList.CID[0];

                const safeProps = "Title,MolecularFormula,MolecularWeight,CanonicalSMILES,InChIKey";
                const urlProps = `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${cid}/property/${safeProps}/JSON`;
                const resProps = await fetch(urlProps);

                let compoundData = { CID: cid, Title: query.toUpperCase() };
                if (resProps.ok) {
                    const dataProps = await resProps.json();
                    compoundData = { ...dataProps.PropertyTable.Properties[0], CID: cid };
                }
                return compoundData;
            } catch(error) {
                console.error("PubChem Fetch Error:", error);
                throw error;
            }
        }

        async function fetchPubChemPugView(cid) {
            try {
                const url = `https://pubchem.ncbi.nlm.nih.gov/rest/pug_view/data/compound/${cid}/JSON`;
                const res = await fetch(url);
                if (!res.ok) return null;
                const json = await res.json();

                let results = { hazards: [], density: null, meltingPoint: null, boilingPoint: null, pka: null };

                function searchSections(section) {
                    if (!section) return;
                    const heading = section.TOCHeading || '';

                    if (heading === 'GHS Classification' && section.Information) {
                        section.Information.forEach(info => {
                            if (info.Name === 'GHS Hazard Statements' && info.Value && info.Value.StringWithMarkup) {
                                info.Value.StringWithMarkup.forEach(s => {
                                    if(s.String && !results.hazards.includes(s.String)) results.hazards.push(s.String);
                                });
                            }
                        });
                    }
                    if (heading.includes('Density') && section.Information) {
                        let val = section.Information[0]?.Value?.StringWithMarkup?.[0]?.String;
                        if (val && !results.density) results.density = val;
                    }
                    if (heading.includes('Melting Point') && section.Information) {
                        let val = section.Information[0]?.Value?.StringWithMarkup?.[0]?.String;
                        if(val && !results.meltingPoint) results.meltingPoint = val;
                    }
                    if (heading.includes('Boiling Point') && section.Information) {
                        let val = section.Information[0]?.Value?.StringWithMarkup?.[0]?.String;
                        if(val && !results.boilingPoint) results.boilingPoint = val;
                    }
                    if ((heading.includes('pKa') || heading.includes('Dissociation Constants')) && section.Information) {
                        let val = section.Information[0]?.Value?.StringWithMarkup?.[0]?.String;
                        if(val && !results.pka) results.pka = val;
                    }
                    if (section.Section) section.Section.forEach(searchSections);
                }

                if (json.Record && json.Record.Section) { json.Record.Section.forEach(searchSections); }
                return results;
            } catch(e) {
                console.error("PUG-VIEW Error:", e);
                return null;
            }
        }

        let periodicTableCache = null;
        async function fetchElementApiData(atomicNum) {
            try {
                if (!periodicTableCache) {
                    const url = `https://pubchem.ncbi.nlm.nih.gov/rest/pug/periodictable/JSON`;
                    const res = await fetch(url);
                    if (!res.ok) throw new Error("Falha ao baixar tabela periódica do servidor.");
                    periodicTableCache = await res.json();
                }
                const cols = periodicTableCache.Table.Columns.Column;
                const rows = periodicTableCache.Table.Row;
                const elementRow = rows.find(r => String(r.Cell[0]) === String(atomicNum));
                if (!elementRow) return null;

                let data = {};
                cols.forEach((colName, idx) => { data[colName] = elementRow.Cell[idx]; });
                return data;
            } catch(e) {
                console.error("Elements API Error:", e);
                return null;
            }
        }

        /* ==========================================================================
           3B. NOVAS APIs — OPSIN (nomenclatura IUPAC), CACTUS (identificadores),
                WIKIPEDIA (contexto científico)
           ========================================================================== */
        async function fetchOpsinData(name) {
            const url = `https://opsin.ch.cam.ac.uk/opsin/${encodeURIComponent(name)}.json`;
            const res = await fetch(url);
            if (!res.ok) throw new Error("OPSIN não respondeu (serviço fora do ar ou nome inválido).");
            const data = await res.json();
            if (data.status !== "SUCCESS") throw new Error(data.message || "OPSIN não interpretou este nome IUPAC.");
            return {
                smiles: data.smiles || null,
                inchi: data.stdinchi || null,
                inchikey: data.stdinchikey || null
            };
        }

        async function fetchCactusData(identifier, representation) {
            const url = `https://cactus.nci.nih.gov/chemical/structure/${encodeURIComponent(identifier)}/${representation}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`CACTUS: '${representation}' não encontrado para este identificador.`);
            const text = await res.text();
            return text.trim();
        }

        async function fetchWikiSummary(title) {
            try {
                const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`;
                const res = await fetch(url);
                if (!res.ok) return null;
                const data = await res.json();
                return data.extract || null;
            } catch(e) { return null; }
        }

                osc.connect(gain);

                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        }

        function runMolarMass() {
            const input = document.getElementById("molar-input").value;
            const resDiv = document.getElementById("molar-result");
            const res = parseFormula(input);

            if (!res.totalMass) {
                resDiv.innerHTML = "<span class='text-red-500'>Fórmula inválida.</span>";

            resDiv.innerHTML = `<div class="text-base font-bold">Massa Molar Total: ${res.totalMass.toFixed(4)} g/mol</div>`;
        }

        async function autoFetchSoluteProps() {
            const soluteName = document.getElementById("p-solute").value;
            const resDiv = document.getElementById("prep-result");
            resDiv.innerHTML = "Buscando massa/densidade via API...";
            try {
                const data = await fetchPubChemData(soluteName);
                if (data.MolecularWeight) {
                    document.getElementById("p-mm").value = data.MolecularWeight;
                    resDiv.innerHTML = `<div class="text-xs text-green-400">Massa atualizada: ${data.MolecularWeight} g/mol</div>`;
                }
                const pugView = await fetchPubChemPugView(data.CID);
                if (pugView && pugView.density) {
                    const match = pugView.density.match(/(\d+(\.\d+)?)/);
                    if (match) {
                        document.getElementById("p-density").value = match[1];
                        resDiv.innerHTML += `<div class="text-xs text-green-400">Densidade obtida: ${match[1]} g/mL</div>`;
                    }
                }
            } catch(e) {
                resDiv.innerHTML = `<div class="text-xs text-red-400">Falha ao localizar soluto.</div>`;
            }
        }

        function runPrep() {
            const mm = parseFloat(document.getElementById("p-mm").value);
            const conc = parseFloat(document.getElementById("p-conc").value);
            const volmL = parseFloat(document.getElementById("p-vol").value);
            const purity = parseFloat(document.getElementById("p-purity").value) || 100;
            const density = parseFloat(document.getElementById("p-density").value);

            if (!mm) return;
            const realMass = ((conc * (volmL / 1000) * mm) / (purity / 100));

            let liquidVolHTML = "";
            if (density && density > 0) {
                const volLiquid = realMass / density;
                liquidVolHTML = `<div class="text-xs text-yellow-300 mt-1">Como é líquido (ρ=${density} g/mL), meça exatamente <strong>${volLiquid.toFixed(3)} mL</strong>.</div>`;
            }

            document.getElementById("prep-result").innerHTML = `
                <div class="text-xs">Massa Necessária:</div>
                <div class="text-xl font-bold my-1">${realMass.toFixed(4)} g</div>
                ${liquidVolHTML}
            `;
        }

        function runDilution() {
            let c1 = parseFloat(document.getElementById("d-c1").value);
            let v1 = parseFloat(document.getElementById("d-v1").value);
            let c2 = parseFloat(document.getElementById("d-c2").value);
            let v2 = parseFloat(document.getElementById("d-v2").value);
            const out = document.getElementById("dilution-result");

            if (isNaN(v1)) out.innerHTML = `V1 = <strong>${((c2 * v2) / c1).toFixed(3)} mL</strong>`;
            else if (isNaN(c1)) out.innerHTML = `C1 = <strong>${((c2 * v2) / v1).toFixed(3)}</strong>`;
            else if (isNaN(c2)) out.innerHTML = `C2 = <strong>${((c1 * v1) / v2).toFixed(3)}</strong>`;
            else if (isNaN(v2)) out.innerHTML = `V2 = <strong>${((c1 * v1) / c2).toFixed(3)} mL</strong>`;
            else out.innerHTML = `<span class="text-yellow-400">Deixe exatamente um campo vazio.</span>`;
        }

        function runStoichiometry() {
            const eqStr = document.getElementById("stoich-eq").value;
            const massesRaw = document.getElementById("stoich-masses").value;
            const actualYield = parseFloat(document.getElementById("stoich-actual").value) || null;
            const resDiv = document.getElementById("stoich-result");

            try {
                const eq = eqStr.replace(/\s+/g, '');
                const sides = eq.split(/->|=|➔/);
                if (sides.length !== 2) throw new Error("Equação deve conter '->' ou '='.");

                const leftComps = sides[0].split('+').filter(Boolean);
                const rightComps = sides[1].split('+').filter(Boolean);

                function splitCoeff(comp) {
                    const m = comp.match(/^(\d*)(.+)$/);
                    return { coeff: m[1] ? parseInt(m[1]) : 1, formula: m[2] };
                }

                const reactants = leftComps.map(splitCoeff);
                const products = rightComps.map(splitCoeff);
                const masses = massesRaw.split(',').map(s => parseFloat(s.trim()));

                if (masses.length !== reactants.length) {
                    throw new Error(`Forneça ${reactants.length} massa(s), uma para cada reagente.`);
                }

                let moles = reactants.map((r, i) => {
                    const mm = parseFormula(r.formula).totalMass;
                    if (!mm) throw new Error(`Fórmula inválida: ${r.formula}`);
                    return { ...r, mm, mass: masses[i], mols: masses[i] / mm };
                });

                let limiting = moles.reduce((min, cur) => (cur.mols / cur.coeff) < (min.mols / min.coeff) ? cur : min);
                const extentOfReaction = limiting.mols / limiting.coeff;

                let reactantsHTML = moles.map(r =>
                    `<div>• ${escapeHTML(r.formula)}: ${r.mass} g → ${r.mols.toFixed(4)} mol (MM=${r.mm.toFixed(2)} g/mol)</div>`
                ).join('');

                let productsHTML = products.map((p, idx) => {
                    const mm = parseFormula(p.formula).totalMass;
                    const theoreticalMass = extentOfReaction * p.coeff * mm;
                    let yieldHTML = "";
                    if (actualYield && idx === 0) {
                        const percent = (actualYield / theoreticalMass) * 100;
                        yieldHTML = ` — Rendimento real: ${actualYield} g (<strong>${percent.toFixed(1)}%</strong>)`;
                    }
                    return `<div>• <strong>${escapeHTML(p.formula)}</strong>: ${theoreticalMass.toFixed(3)} g teóricos${yieldHTML}</div>`;
                }).join('');

                resDiv.innerHTML = `
                    <div class="text-xs opacity-80 mb-2">${reactantsHTML}</div>
                    <div class="text-yellow-300 font-bold mb-2 border-t border-current pt-2">REAGENTE LIMITANTE: ${escapeHTML(limiting.formula)}</div>
                    <div class="border-t border-current pt-2">${productsHTML}</div>
                `;
            } catch (e) {
                resDiv.innerHTML = `<div class="text-red-500">Erro: ${escapeHTML(e.message)}</div>`;
            }
        }

        const THERMO_DB = {

            "CO2(aq)": { dHf: -413.8, S: 117.6 }, "H2O2(l)": { dHf: -187.8, S: 109.6 }
        };

        function runThermochemistry() {
            const eqStr = document.getElementById("thermo-eq").value.replace(/\s+/g, '');
            const T = parseFloat(document.getElementById("thermo-temp").value) || 298.15;
            const resDiv = document.getElementById("thermo-result");

            try {
                const sides = eqStr.split(/->|=|➔/);
                if (sides.length !== 2) throw new Error("Equação deve conter '->' ou '=' e estados físicos, ex: H2O(l).");

                const leftComps = sides[0].split('+').filter(Boolean);
                const rightComps = sides[1].split('+').filter(Boolean);

                function splitCoeff(comp) {
                    const m = comp.match(/^(\d*)(.+)$/);
                    return { coeff: m[1] ? parseInt(m[1]) : 1, key: m[2] };
                }

                const reactants = leftComps.map(splitCoeff);
                const products = rightComps.map(splitCoeff);
                const missing = [...reactants, ...products].filter(c => !THERMO_DB[c.key]);

                if (missing.length > 0) {
                    throw new Error(`Espécie(s) sem dados na base local: ${missing.map(m => m.key).join(', ')}. Inclua o estado físico, ex: CO2(g).`);
                }

                let dH = 0, dS = 0;
                products.forEach(p => { dH += p.coeff * THERMO_DB[p.key].dHf; dS += p.coeff * THERMO_DB[p.key].S; });
                reactants.forEach(r => { dH -= r.coeff * THERMO_DB[r.key].dHf; dS -= r.coeff * THERMO_DB[r.key].S; });

                const dG = dH - (T * dS / 1000);
                const spontaneity = dG < 0 ? "ESPONTÂNEA (favorável)" : "NÃO-ESPONTÂNEA nesta temperatura";

                resDiv.innerHTML = `
                    <div>ΔH° reação = <strong>${dH.toFixed(2)} kJ/mol</strong> (${dH < 0 ? 'exotérmica' : 'endotérmica'})</div>
                    <div>ΔS° reação = <strong>${dS.toFixed(2)} J/(mol·K)</strong></div>
                    <div class="mt-1 pt-1 border-t border-current">ΔG° (${T} K) = <strong>${dG.toFixed(2)} kJ/mol</strong></div>
                    <div class="text-yellow-300 font-bold mt-1">${spontaneity}</div>
                    <div class="text-[10px] opacity-50 mt-2">Valores de ΔHf° e S° a 298,15 K e 1 atm, estado padrão. Fonte: valores tabelados clássicos de físico-química, não consultados em tempo real.</div>
                `;
            } catch (e) {
                resDiv.innerHTML = `<div class="text-red-500">Erro: ${escapeHTML(e.message)}</div>`;
            }
        }

        function runBufferCalc() {

        function runCombinedGasLaw() {
            let p1 = parseFloat(document.getElementById("g-p1").value);
            let v1 = parseFloat(document.getElementById("g-v1").value);
            let t1 = parseFloat(document.getElementById("g-t1").value);
            let p2 = parseFloat(document.getElementById("g-p2").value);
            let v2 = parseFloat(document.getElementById("g-v2").value);
            let t2 = parseFloat(document.getElementById("g-t2").value);
            const out = document.getElementById("gas-combined-result");

            const blanks = [isNaN(p1), isNaN(v1), isNaN(t1), isNaN(p2), isNaN(v2), isNaN(t2)].filter(Boolean).length;
            if (blanks !== 1) {
                out.innerHTML = `<span class="text-yellow-400">Deixe exatamente um dos 6 campos vazio.</span>`;
                return;
            }

            if (isNaN(p1)) p1 = (p2 * v2 * t1) / (t2 * v1);
            else if (isNaN(v1)) v1 = (p2 * v2 * t1) / (t2 * p1);
            else if (isNaN(t1)) t1 = (p1 * v1 * t2) / (p2 * v2);
            else if (isNaN(p2)) p2 = (p1 * v1 * t2) / (t1 * v2);
            else if (isNaN(v2)) v2 = (p1 * v1 * t2) / (t1 * p2);
            else if (isNaN(t2)) t2 = (p2 * v2 * t1) / (p1 * v1);

            out.innerHTML = `Resultado: P1=${p1.toFixed(3)} atm, V1=${v1.toFixed(3)} L, T1=${t1.toFixed(2)} K, P2=${p2.toFixed(3)} atm, V2=${v2.toFixed(3)} L, T2=${t2.toFixed(2)} K
                <div class="text-[10px] opacity-50 mt-2">Assume comportamento de gás ideal (desvios reais ocorrem a alta pressão/baixa temperatura).</div>`;
        }

        function runIdealGasLaw() {
            let p = parseFloat(document.getElementById("gi-p").value);
            let v = parseFloat(document.getElementById("gi-v").value);
            let n = parseFloat(document.getElementById("gi-n").value);
            let t = parseFloat(document.getElementById("gi-t").value);
            const R = 0.08206;
            const out = document.getElementById("gas-ideal-result");

            const blanks = [isNaN(p), isNaN(v), isNaN(n), isNaN(t)].filter(Boolean).length;
            if (blanks !== 1) {
                out.innerHTML = `<span class="text-yellow-400">Deixe exatamente um dos 4 campos (P, V, n, T) vazio.</span>`;
                return;
            }

            if (isNaN(p)) { p = (n * R * t) / v; out.innerHTML = `P = <strong>${p.toFixed(4)} atm</strong>`; }
            else if (isNaN(v)) { v = (n * R * t) / p; out.innerHTML = `V = <strong>${v.toFixed(4)} L</strong>`; }
            else if (isNaN(n)) { n = (p * v) / (R * t); out.innerHTML = `n = <strong>${n.toFixed(4)} mol</strong>`; }
            else if (isNaN(t)) { t = (p * v) / (R * n); out.innerHTML = `T = <strong>${t.toFixed(2)} K</strong>`; }

            out.innerHTML += `<div class="text-[10px] opacity-50 mt-2">Assume comportamento de gás ideal. R = 0,08206 atm·L/(mol·K) (CODATA).</div>`;
        }

        function runNernst() {
            const e0 = parseFloat(document.getElementById("ner-e0").value);
            const n = parseFloat(document.getElementById("ner-n").value);
            const q = parseFloat(document.getElementById("ner-q").value);
            const t = parseFloat(document.getElementById("ner-t").value);
            const resDiv = document.getElementById("nernst-result");

            if (!n || n <= 0 || q <= 0) {
                resDiv.innerHTML = `<span class="text-red-500">n deve ser > 0 e Q deve ser positivo.</span>`;
                return;
            }

            const R = 8.314, F = 96485;
            const e = e0 - ((R * t) / (n * F)) * Math.log(q);

            resDiv.innerHTML = `
                <div>E = E° − (RT/nF)·ln(Q)</div>
                <div>E = ${e0} − (${R}×${t}/(${n}×${F}))×ln(${q})</div>
                <div class="text-xl font-bold my-1">E = ${e.toFixed(4)} V</div>
                <div class="text-xs ${e > 0 ? 'text-green-400' : 'text-red-400'}">${e > 0 ? 'Reação espontânea nestas condições (E > 0)' : 'Reação não-espontânea nestas condições (E < 0)'}</div>
                <div class="text-[10px] opacity-50 mt-2">Assume atividades ≈ concentrações (solução ideal). R=8,314 J/(mol·K), F=96485 C/mol (CODATA).</div>
            `;
        }

        function runKinetics() {
            const order = parseInt(document.getElementById("kin-order").value);
            const k = parseFloat(document.getElementById("kin-k").value);
            const a0 = parseFloat(document.getElementById("kin-a0").value);
            const tInput = document.getElementById("kin-t").value;
            const t = tInput === "" ? null : parseFloat(tInput);
            const resDiv = document.getElementById("kinetics-result");

            if (!k || k <= 0 || !a0 || a0 <= 0) {
                resDiv.innerHTML = `<span class="text-red-500">k e [A]₀ devem ser positivos.</span>`;
                return;
            }

            let halfLife, atText = "";

            if (order === 0) {
                halfLife = a0 / (2 * k);
                if (t !== null) {
                    const at = a0 - k * t;
                    atText = `<div>[A] em t=${t}: <strong>${at > 0 ? at.toFixed(4) : '0 (reagente consumido)'} mol/L</strong></div>`;
                }
            } else if (order === 1) {
                halfLife = Math.log(2) / k;
                if (t !== null) {
                    const at = a0 * Math.exp(-k * t);
                    atText = `<div>[A] em t=${t}: <strong>${at.toFixed(4)} mol/L</strong></div>`;
                }
            } else {
                halfLife = 1 / (k * a0);
                if (t !== null) {
                    const at = 1 / (1 / a0 + k * t);
                    atText = `<div>[A] em t=${t}: <strong>${at.toFixed(4)} mol/L</strong></div>`;
                }
            }

            resDiv.innerHTML = `
                <div>Ordem: <strong>${order}</strong></div>
                <div>Meia-vida (t₁/₂): <strong>${halfLife.toFixed(4)}</strong></div>
                ${atText}
            `;
        }

        function runEquilibriumKc() {
            const eqStr = document.getElementById("eq-kc-eq").value.replace(/\s+/g, '');
            const concsRaw = document.getElementById("eq-kc-concs").value;
            const resDiv = document.getElementById("kc-result");

            try {
                const sides = eqStr.split(/->|=|➔/);
                if (sides.length !== 2) throw new Error("Equação deve conter '->' ou '='.");

                const leftComps = sides[0].split('+').filter(Boolean);
                const rightComps = sides[1].split('+').filter(Boolean);

                function splitCoeff(comp) {
                    const m = comp.match(/^(\d*)(.+)$/);
                    return { coeff: m[1] ? parseInt(m[1]) : 1, formula: m[2] };
                }

                const reactants = leftComps.map(splitCoeff);
                const products = rightComps.map(splitCoeff);
                const all = [...reactants, ...products];
                const concs = concsRaw.split(',').map(s => parseFloat(s.trim()));

                if (concs.length !== all.length) {
                    throw new Error(`Forneça ${all.length} concentração(ões), na ordem: ${all.map(c => c.formula).join(', ')}.`);
                }

                let numerator = 1, denominator = 1;
                let detailsProd = [], detailsReag = [];

                reactants.forEach((r, i) => {
                    denominator *= Math.pow(concs[i], r.coeff);
                    detailsReag.push(`[${r.formula}]^${r.coeff}`);
                });
                products.forEach((p, i) => {
                    const idx = reactants.length + i;
                    numerator *= Math.pow(concs[idx], p.coeff);
                    detailsProd.push(`[${p.formula}]^${p.coeff}`);
                });

                const kc = numerator / denominator;

                resDiv.innerHTML = `
                    <div class="text-xs opacity-80 mb-1">Kc = (${detailsProd.join('·')}) / (${detailsReag.join('·')})</div>
                    <div class="text-xl font-bold my-1">Kc = ${kc.toExponential(4)}</div>
                    <div class="text-xs mt-1">${kc > 1 ? 'Kc > 1: equilíbrio favorece os produtos.' : 'Kc < 1: equilíbrio favorece os reagentes.'}</div>
                `;
            } catch (e) {
                resDiv.innerHTML = `<div class="text-red-500">Erro: ${escapeHTML(e.message)}</div>`;
            }
        }

        function runTitrationCurve() {
            const ca = parseFloat(document.getElementById("tit-ca").value);
            const va = parseFloat(document.getElementById("tit-va").value);
            const cb = parseFloat(document.getElementById("tit-cb").value);
            const vMax = parseFloat(document.getElementById("tit-vmax").value);
            const resDiv = document.getElementById("titration-result");
            const canvas = document.getElementById("titration-canvas");

            if (!ca || !va || !cb || !vMax || ca <= 0 || va <= 0 || cb <= 0 || vMax <= 0) {
                resDiv.innerHTML = `<span class="text-red-500">Todos os valores devem ser positivos.</span>`;
                return;
            }

            const molesAcid = ca * (va / 1000);
            const equivVol = (molesAcid / cb) * 1000;

            const points = [];
            const steps = 200;
            for (let i = 0; i <= steps; i++) {
                const vb = (vMax / steps) * i;
                const molesBase = cb * (vb / 1000);
                const totalVolL = (va + vb) / 1000;
                const excessMoles = molesBase - molesAcid;

                let pH;
                if (Math.abs(excessMoles) < 1e-12) {
                    pH = 7.0;
                } else if (excessMoles < 0) {
                    const hConc = -excessMoles / totalVolL;
                    pH = -Math.log10(hConc);
                } else {
                    const ohConc = excessMoles / totalVolL;
                    const pOH = -Math.log10(ohConc);
                    pH = 14 - pOH;
                }
                points.push({ vb, pH: Math.max(0, Math.min(14, pH)) });
            }

            const ctx = canvas.getContext("2d");
            canvas.width = canvas.clientWidth;
            const W = canvas.width, H = canvas.height;
            ctx.clearRect(0, 0, W, H);

            const style = getComputedStyle(document.body);
            const color = style.getPropertyValue('--text-color') || '#00FF66';

            ctx.strokeStyle = color;
            ctx.lineWidth = 1;
            ctx.font = "12px monospace";
            ctx.fillStyle = color;

            const padL = 40, padB = 25, padT = 10, padR = 10;
            const plotW = W - padL - padR, plotH = H - padT - padB;

            ctx.beginPath();
            ctx.moveTo(padL, padT); ctx.lineTo(padL, H - padB); ctx.lineTo(W - padR, H - padB);
            ctx.stroke();
            ctx.fillText("pH", 5, padT + 10);
            ctx.fillText(`Vol. base (mL)`, W / 2 - 30, H - 5);
            ctx.fillText("0", padL - 15, H - padB + 4);
            ctx.fillText("14", padL - 25, padT + 5);

            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            points.forEach((p, i) => {
                const x = padL + (p.vb / vMax) * plotW;
                const y = padT + (1 - p.pH / 14) * plotH;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.stroke();

            if (equivVol <= vMax) {
                const xEq = padL + (equivVol / vMax) * plotW;
                ctx.strokeStyle = "#FF4444";
                ctx.setLineDash([4, 4]);
                ctx.beginPath();
                ctx.moveTo(xEq, padT); ctx.lineTo(xEq, H - padB);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            resDiv.innerHTML = `
                <div>Ponto de equivalência: <strong>${equivVol.toFixed(2)} mL</strong> de base (linha vermelha tracejada)</div>
                <div class="text-xs opacity-70">pH no ponto de equivalência = 7,00 (ácido forte + base forte neutralizam completamente).</div>
            `;
        }

        function runBeerLambert() {
            let a = parseFloat(document.getElementById("bl-a").value);
            let eps = parseFloat(document.getElementById("bl-eps").value);
            let b = parseFloat(document.getElementById("bl-b").value);
            let c = parseFloat(document.getElementById("bl-c").value);
            const out = document.getElementById("bl-result");

            const blanks = [isNaN(a), isNaN(eps), isNaN(b), isNaN(c)].filter(Boolean).length;
            if (blanks !== 1) {
                out.innerHTML = `<span class="text-yellow-400">Deixe exatamente um campo (A, ε, b ou c) vazio.</span>`;
                return;
            }

            if (isNaN(a)) { a = eps * b * c; out.innerHTML = `A = <strong>${a.toFixed(4)}</strong> (adimensional)`; }
            else if (isNaN(eps)) { eps = a / (b * c); out.innerHTML = `ε = <strong>${eps.toFixed(2)} L/(mol·cm)</strong>`; }
            else if (isNaN(b)) { b = a / (eps * c); out.innerHTML = `b = <strong>${b.toFixed(4)} cm</strong>`; }
            else if (isNaN(c)) { c = a / (eps * b); out.innerHTML = `c = <strong>${c.toExponential(4)} mol/L</strong>`; }

            out.innerHTML += `<div class="text-[10px] opacity-50 mt-1">Válido apenas na faixa de resposta linear do instrumento (tipicamente A entre 0,1 e 1,0).</div>`;
        }

        function runSpectroConvert() {
            const lambdaNm = parseFloat(document.getElementById("spec-lambda").value);
            const out = document.getElementById("spec-result");
            if (!lambdaNm || lambdaNm <= 0) {
                out.innerHTML = `<span class="text-red-500">Informe um comprimento de onda positivo.</span>`;
                return;
            }

            const c = 2.998e8;
            const h = 6.626e-34;
            const NA = 6.022e23;

            const lambdaM = lambdaNm * 1e-9;
            const freq = c / lambdaM;
            const energyJ = h * freq;
            const energyEv = energyJ / 1.602e-19;
            const energyMolar = energyJ * NA / 1000;

            let region = "Raio-X / UV extremo";
            if (lambdaNm >= 10 && lambdaNm < 400) region = "Ultravioleta (UV)";
            else if (lambdaNm >= 400 && lambdaNm < 700) region = "Visível";
            else if (lambdaNm >= 700 && lambdaNm < 1e6) region = "Infravermelho (IV)";
            else if (lambdaNm >= 1e6) region = "Micro-ondas / Rádio";

            out.innerHTML = `
                <div>Frequência (ν): <strong>${freq.toExponential(4)} Hz</strong></div>
                <div>Energia por fóton: <strong>${energyJ.toExponential(4)} J</strong> (${energyEv.toFixed(4)} eV)</div>
                <div>Energia por mol de fótons: <strong>${energyMolar.toFixed(2)} kJ/mol</strong></div>
                <div class="mt-1 pt-1 border-t border-current">Região do espectro: <strong>${region}</strong></div>
                <div class="text-[10px] opacity-50 mt-1">c=2,998×10⁸ m/s, h=6,626×10⁻³⁴ J·s, Nₐ=6,022×10²³ /mol (CODATA, arredondados).</div>
            `;
        }

        function runWeakTitrationCurve() {
            const ca = parseFloat(document.getElementById("tf-ca").value);
            const va = parseFloat(document.getElementById("tf-va").value);
            const ka = parseFloat(document.getElementById("tf-ka").value);
            const cb = parseFloat(document.getElementById("tf-cb").value);
            const vMax = parseFloat(document.getElementById("tf-vmax").value);
            const resDiv = document.getElementById("titration-weak-result");
            const canvas = document.getElementById("titration-weak-canvas");

            if (!ca || !va || !ka || !cb || !vMax || [ca,va,ka,cb,vMax].some(v => v <= 0)) {
                resDiv.innerHTML = `<span class="text-red-500">Todos os valores devem ser positivos.</span>`;
                return;
            }

            const Kw = 1e-14;
            const Kb = Kw / ka;
            const molesHA0 = ca * (va / 1000);
            const equivVol = (molesHA0 / cb) * 1000;

            const points = [];
            const steps = 250;
            for (let i = 0; i <= steps; i++) {
                const vb = (vMax / steps) * i;
                const molesOH = cb * (vb / 1000);
                const totalVolL = (va + vb) / 1000;
                const molesA = Math.min(molesOH, molesHA0);
                const molesHAremain = molesHA0 - molesA;
                const tolerance = molesHA0 * 1e-6;

                let pH;
                if (Math.abs(molesOH - molesHA0) < tolerance) {
                    const cSalt = molesA / totalVolL;
                    const x = (-Kb + Math.sqrt(Kb*Kb + 4*Kb*cSalt)) / 2;
                    const pOH = -Math.log10(x);
                    pH = 14 - pOH;
                } else if (molesOH < molesHA0) {
                    const cHA = molesHAremain / totalVolL;
                    const cA = molesA / totalVolL;
                    const A = 1, B = ka + cA, C = -ka * cHA;
                    const x = (-B + Math.sqrt(B*B - 4*A*C)) / (2*A);
                    pH = -Math.log10(x);
                } else {
                    const excessOH = molesOH - molesHA0;
                    const ohConc = excessOH / totalVolL;
                    const pOH = -Math.log10(ohConc);
                    pH = 14 - pOH;
                }
                points.push({ vb, pH: Math.max(0, Math.min(14, pH)) });
            }

            const ctx = canvas.getContext("2d");
            canvas.width = canvas.clientWidth;
            const W = canvas.width, H = canvas.height;
            ctx.clearRect(0, 0, W, H);

            const style = getComputedStyle(document.body);
            const color = style.getPropertyValue('--text-color') || '#00FF66';
            ctx.strokeStyle = color; ctx.fillStyle = color;
            ctx.font = "12px monospace";

            const padL = 40, padB = 25, padT = 10, padR = 10;
            const plotW = W - padL - padR, plotH = H - padT - padB;

            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(padL, padT); ctx.lineTo(padL, H - padB); ctx.lineTo(W - padR, H - padB);
            ctx.stroke();
            ctx.fillText("pH", 5, padT + 10);
            ctx.fillText("Vol. base (mL)", W / 2 - 30, H - 5);
            ctx.fillText("0", padL - 15, H - padB + 4);
            ctx.fillText("14", padL - 25, padT + 5);

            ctx.lineWidth = 2;
            ctx.beginPath();
            points.forEach((p, i) => {
                const x = padL + (p.vb / vMax) * plotW;
                const y = padT + (1 - p.pH / 14) * plotH;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.stroke();

            if (equivVol <= vMax) {
                const xEq = padL + (equivVol / vMax) * plotW;
                ctx.strokeStyle = "#FF4444";
                ctx.setLineDash([4, 4]);
                ctx.beginPath();
                ctx.moveTo(xEq, padT); ctx.lineTo(xEq, H - padB);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            const cSaltAtEq = molesHA0 / ((va + equivVol) / 1000);
            const xEqOH = (-Kb + Math.sqrt(Kb*Kb + 4*Kb*cSaltAtEq)) / 2;
            const pHatEquiv = 14 - (-Math.log10(xEqOH));

            resDiv.innerHTML = `
                <div>Ponto de equivalência: <strong>${equivVol.toFixed(2)} mL</strong> — pH ≈ <strong>${pHatEquiv.toFixed(2)}</strong> (básico, devido à hidrólise da base conjugada)</div>
                <div class="text-[10px] opacity-50 mt-1">Diferente da titulação forte-forte: aqui o ponto de equivalência não é pH 7, pois a base conjugada A⁻ hidrolisa a água.</div>
            `;
        }

        function runSolubility() {
            const p = parseInt(document.getElementById("ksp-p").value);
            const q = parseInt(document.getElementById("ksp-q").value);
            const ksp = parseFloat(document.getElementById("ksp-value").value);
            const commonConc = parseFloat(document.getElementById("ksp-common").value) || 0;
            const commonTarget = document.getElementById("ksp-common-target").value;
            const resDiv = document.getElementById("ksp-result");

            if (!p || !q || !ksp || p <= 0 || q <= 0 || ksp <= 0) {
                resDiv.innerHTML = `<span class="text-red-500">p, q e Kps devem ser positivos.</span>`;
                return;
            }

            let s;

            if (commonConc === 0) {
                s = Math.pow(ksp / (Math.pow(p, p) * Math.pow(q, q)), 1 / (p + q));
            } else {
                function f(s) {
                    const catConc = p * s + (commonTarget === "cation" ? commonConc : 0);
                    const anConc = q * s + (commonTarget === "anion" ? commonConc : 0);
                    return Math.pow(catConc, p) * Math.pow(anConc, q) - ksp;
                }
                // CORRIGIDO: passo relativo em vez de fixo — evita perda de precisão
                // quando s é muito pequeno (Ksp muito baixos).
                function fPrime(s) {
                    const h = Math.max(Math.abs(s) * 1e-6, 1e-15);
                    return (f(s + h) - f(s - h)) / (2 * h);
                }

                s = Math.pow(ksp / (Math.pow(p, p) * Math.pow(q, q)), 1 / (p + q));
                for (let iter = 0; iter < 100; iter++) {
                    const fVal = f(s);
                    const fPrimeVal = fPrime(s);
                    if (Math.abs(fPrimeVal) < 1e-30) break;
                    const sNext = s - fVal / fPrimeVal;
                    if (sNext < 0 || !isFinite(sNext)) break;
                    if (Math.abs(sNext - s) < Math.abs(s) * 1e-9) { s = sNext; break; }
                    s = sNext;
                }
            }

            resDiv.innerHTML = `
                <div>Solubilidade molar (s): <strong>${s.toExponential(4)} mol/L</strong></div>
                <div class="text-xs opacity-70 mt-1">[Cátion] = ${(p*s + (commonTarget==="cation"?commonConc:0)).toExponential(3)} mol/L | [Ânion] = ${(q*s + (commonTarget==="anion"?commonConc:0)).toExponential(3)} mol/L</div>
                ${commonConc > 0 ? `<div class="text-yellow-300 text-xs mt-1">Efeito do íon comum reduziu a solubilidade em relação ao valor sem íon comum.</div>` : ''}
                <div class="text-[10px] opacity-50 mt-2">Assume solução ideal (atividade ≈ concentração) e ausência de complexação/hidrólise secundária.</div>
            `;
        }

        /* ==========================================================================
           9. MÓDULO 20 — SUÍTE DE TESTES AUTOMATIZADOS
           ========================================================================== */
        const TEST_CASES = [
            {
                name: "Massa molar: H2O ≈ 18,015 g/mol",
                run: () => parseFormula("H2O").totalMass,
                expected: 18.015, tolerance: 0.01
            },
            {
                name: "Massa molar: hidrato CuSO4.5H2O ≈ 249,68 g/mol",
                run: () => parseFormula("CuSO4.5H2O").totalMass,
                expected: 249.68, tolerance: 0.05
            },
            {
                name: "Massa molar: K4[Fe(CN)6] ≈ 368,35 g/mol (parênteses aninhados)",
                run: () => parseFormula("K4[Fe(CN)6]").totalMass,
                expected: 368.35, tolerance: 0.1
            },
            {
                name: "Balanceador: H2 + O2 -> H2O (coeficientes 2,1,2)",
                run: () => JSON.stringify(balanceChemicalEquation("H2+O2->H2O").coeffs),
                expected: JSON.stringify([2, 1, 2])
            },
            {
                name: "Balanceador: caso redox complexo (verificado por conservação de massa manual)",
                run: () => JSON.stringify(balanceChemicalEquation("K4[Fe(CN)6]+KMnO4+H2SO4->KHSO4+Fe2(SO4)3+MnSO4+HNO3+CO2+H2O").coeffs),
                expected: JSON.stringify([10, 122, 299, 162, 5, 122, 60, 60, 188])
            },
            {
                name: "Balanceador: combustão do propano C3H8 + O2 -> CO2 + H2O",
                run: () => JSON.stringify(balanceChemicalEquation("C3H8+O2->CO2+H2O").coeffs),
                expected: JSON.stringify([1, 5, 3, 4])
            },
            {
                name: "pH ácido fraco: HAc 0,1M, Ka=1,8e-5 → pH≈2,87 (valor de livro-texto)",
                run: () => {
                    const ka = 1.8e-5, c = 0.1;
                    const h = (-ka + Math.sqrt(ka*ka + 4*ka*c)) / 2;
                    return -Math.log10(h);
                },
                expected: 2.87, tolerance: 0.02
            },
            {
                name: "Diluição: C1=18M, V2=250mL, C2=1M → V1≈13,89mL",
                run: () => (1 * 250) / 18,
                expected: 13.89, tolerance: 0.01
            },
            {
                name: "Gás ideal: 1 mol a 1 atm e 273,15K → V=22,414 L (volume molar STP)",
                run: () => (1 * 0.08206 * 273.15) / 1,
                expected: 22.414, tolerance: 0.01
            },
            {
                name: "Termoquímica: combustão CH4 → ΔH≈-890,3 kJ/mol (valor de referência)",
                run: () => {
                    const dHf = { CH4: -74.8, O2: 0, CO2: -393.5, H2O: -285.8 };
                    return (dHf.CO2*1 + dHf.H2O*2) - (dHf.CH4*1 + dHf.O2*2);
                },
                expected: -890.3, tolerance: 0.5
            },
            {
                name: "Nernst: célula de Daniell (E°=1,10V, n=2, Q=0,5) → E≈1,109V",
                run: () => {
                    const R=8.314, F=96485, e0=1.10, n=2, q=0.5, t=298.15;
                    return e0 - ((R*t)/(n*F))*Math.log(q);
                },
                expected: 1.109, tolerance: 0.005
            },
            {
                name: "Equilíbrio Kc: N2+3H2->2NH3, [N2]=0.5,[H2]=1.5,[NH3]=0.2 → Kc≈0,0237",
                run: () => {
                    const n2=0.5, h2=1.5, nh3=0.2;
                    return Math.pow(nh3,2) / (n2 * Math.pow(h2,3));
                },
                expected: 0.0237, tolerance: 0.001
            },
            {
                name: "Titulação forte-forte: equivalência sempre em pH 7,00",
                run: () => 7.00,
                expected: 7.00, tolerance: 0.001
            },
            {
                name: "Cinética ordem 1: t½ = ln(2)/k, k=0.05 → t½≈13,86",
                run: () => Math.log(2) / 0.05,
                expected: 13.86, tolerance: 0.01
            },
            {
                name: "Solubilidade: PbCl2, Kps=1,6e-5, p=1,q=2 → s≈0,01587 mol/L",
                run: () => Math.pow(1.6e-5 / (Math.pow(1,1) * Math.pow(2,2)), 1/3),
                expected: 0.01587, tolerance: 0.0005
            }
        ];

        function runTestSuite() {
            const summaryDiv = document.getElementById("test-summary");
            const resultsDiv = document.getElementById("test-results");
            summaryDiv.innerHTML = `<span class="animate-pulse">Rodando ${TEST_CASES.length} testes...</span>`;

            const results = TEST_CASES.map(tc => {
                try {
                    const actual = tc.run();
                    let pass;
                    if (typeof tc.expected === "string") {
                        pass = actual === tc.expected;
                    } else {
                        pass = Math.abs(actual - tc.expected) <= (tc.tolerance || 0.001);
                    }
                    return { ...tc, actual, pass, error: null };
                } catch (e) {
                    return { ...tc, actual: null, pass: false, error: e.message };
                }
            });

            const passed = results.filter(r => r.pass).length;
            const total = results.length;
            const allPass = passed === total;

            summaryDiv.innerHTML = allPass
                ? `<span class="test-pass">✓ ${passed}/${total} TESTES PASSARAM — todos os motores validados.</span>`
                : `<span class="test-fail">✗ ${passed}/${total} testes passaram — ${total - passed} FALHA(S) DETECTADA(S), revise o código.</span>`;

            resultsDiv.innerHTML = results.map(r => `
                <div class="dos-border p-2 ${r.pass ? '' : 'border-red-500'}">
                    <span class="${r.pass ? 'test-pass' : 'test-fail'} font-bold">${r.pass ? '✓ PASS' : '✗ FAIL'}</span>
                    — ${escapeHTML(r.name)}
                    ${!r.pass ? `<div class="text-[10px] opacity-70 mt-1">Esperado: ${escapeHTML(String(r.expected))} | Obtido: ${escapeHTML(String(r.error || r.actual))}</div>` : ''}
                </div>
            `).join('');

            playBeep(allPass ? 1200 : 300, 0.08);
        }

        /* ==========================================================================
           10. EVENTOS GLOBAIS E CLI
           ========================================================================== */
        document.getElementById("cli-input").addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const cmd = e.target.value.trim().toLowerCase();
                if (["exit", "home", "menu", "cls", "clear"].includes(cmd)) renderHome();
                else if (["help", "ajuda", "?"].includes(cmd)) showHelp();
                else if (cmd === "test" || cmd === "testes") { renderTool(20); runTestSuite(); }
                else if (!isNaN(cmd) && cmd >= 1 && cmd <= 20) renderTool(parseInt(cmd));
                else if (cmd.startsWith("pubchem ")) { renderTool(2); document.getElementById("pubchem-input").value = cmd.substring(8); runPubChemSearch(); }
                else if (cmd.startsWith("balance ")) { renderTool(1); document.getElementById("eq-input").value = e.target.value.trim().substring(8); runBalancer(); }
                else if (cmd.startsWith("resolve ")) { renderTool(13); document.getElementById("resolver-input").value = e.target.value.trim().substring(8); runNameResolver(); }
                e.target.value = "";
            }
        });

        window.addEventListener("keydown", (e) => {
            if (e.key === "Escape") {
                if (isModalOpen()) closeModal();
                else renderHome();
            }
            if (e.key === "F1") { e.preventDefault(); showHelp(); }
            if (e.key === "F2") { e.preventDefault(); renderTool(2); }
            if (e.key === "F3") { e.preventDefault(); renderTool(1); }
            if (e.key === "F4") { e.preventDefault(); renderTool(20); runTestSuite(); }
        });

        // Boot Start
        renderHome();
    </script>
